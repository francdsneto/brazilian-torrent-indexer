  #     test: ["CMD-SHELL", "curl -f http://localhost:7070/api?t=caps || exit 1"]
  #     interval: 20s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 30s

  betor-proxy:
    build: ./btor-sonarr-middleware
    container_name: betor-proxy
    ports:
      - 7008:7008
    volumes:
      - ./app-data/betor-proxy-data:/app/data
    environment:
      - TZ=America/Sao_Paulo
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7008/api?t=caps || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  ts-plex:
    image: tailscale/tailscale:latest
    container_name: ts-plex
    hostname: plex-server-remoto
    environment:
      - TS_AUTHKEY=tskey-auth-k3vV9yKBLa11CNTRL-hjiA482J2iUreihbWpqdiUWWFBcXkYsE
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - /home/neto/youtube-dvr/ts-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped
    ports:
      - "32400:32400"

  plex:
    image: plexinc/pms-docker
    container_name: plex
    restart: unless-stopped
    network_mode: service:ts-plex
    devices:
      - /dev/dri:/dev/dri
    environment:
      - PLEX_CLAIM=claim-caKTeot12oPV4AsQysag
      - TZ=America/Fortaleza
      - PUID=1000
      - PGID=1000
      - ADVERTISE_IP=http://192.168.1.150:32400/
    volumes:
      - /home/neto/plex/config:/config
      - /home/neto/youtube-dvr/downloads:/youtube_videos:ro
      - /mnt/realdebrid:/mnt/realdebrid:ro,rslave
      - ./media:/media:ro
    depends_on:
      ts-plex:
        condition: service_started
      rclone:
        condition: service_healthy
