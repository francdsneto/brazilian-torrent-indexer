  comet:
    image: ghcr.io/g0ldyy/comet:latest
    container_name: comet
    restart: unless-stopped
    ports:
      - 54321:8000
    volumes:
      - ./comet/data:/app/data
    environment:
      - TZ=America/Sao_Paulo
      - FASTAPI_HOST=0.0.0.0
      - FASTAPI_PORT=8000
      - FASTAPI_WORKERS=1
      - INDEXER_MANAGER_TYPE=prowlarr
      - INDEXER_MANAGER_URL=http://prowlarr:9696
      - INDEXER_MANAGER_API_KEY=806fba39ea704f458c3a2f75c064e0a5
      - INDEXER_MANAGER_TIMEOUT=20
      - ANIME_MAPPING_ENABLED=False 
    depends_on:
      prowlarr:
        condition: service_healthy

  dfindexer:
    image: ghcr.io/dflexy/dfindexer:latest
    container_name: dfindexer
    ports:
      - 9697:7006
    environment:
      - REDIS_HOST=redis-dfindexer
      - REDIS_PORT=6379
      - FLARESOLVERR_ADDRESS=http://flaresolverr:8191
      - FLARESOLVERR_TIMEOUT=120
      - PORT=7006
      - LOG_LEVEL=1
      - LOG_FORMAT=console
      - TZ=America/Sao_Paulo
    depends_on:
      redis-dfindexer:
        condition: service_healthy
      flaresolverr:
        condition: service_healthy
    restart: unless-stopped

  dfindexer-proxy:
    build: ./my-middlware-dfindexer-prowlarr
    container_name: dfindexer-proxy
    ports:
      - 7070:7070
    volumes:
      - ./my-middlware-dfindexer-prowlarr/data:/app/data
    environment:
      - DFINDEXER_URL=http://dfindexer:7006
      - TZ=America/Sao_Paulo
    depends_on:
      dfindexer:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7070/api?t=caps || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis-dfindexer:
    image: redis:7
    container_name: redis-dfindexer
    volumes:
      - ./dfindexer/redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
