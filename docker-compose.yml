services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - DOTNET_SYSTEM_NET_HTTP_USESOCKETSHTTPHANDLER=0
    volumes:
      - ./app-data/prowlarr-config:/config
    ports:
      - 9696:9696
    restart: unless-stopped
    logging: &default-logging
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      flaresolverr:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9696/ping || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ./app-data/radarr-config:/config
      - ./data/downloads:/downloads 
      - /mnt/realdebrid:/mnt/realdebrid:rshared 
    ports:
      - 7878:7878
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      prowlarr:
        condition: service_healthy
      rdt-client:
        condition: service_healthy
      rclone:
        condition: service_healthy

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ./app-data/sonarr-config:/config
      - ./data/downloads:/downloads
      - /mnt/realdebrid:/mnt/realdebrid:rshared
    ports:
      - 8989:8989
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      prowlarr:
        condition: service_healthy
      rdt-client:
        condition: service_healthy
      rclone:
        condition: service_healthy

  rdt-client:
    image: rogerfar/rdtclient:latest
    container_name: rdt-client
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ./rdtclient/data:/data
      - /mnt/realdebrid:/mnt/realdebrid:rshared
    ports:
      - 6500:6500
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      rclone:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6500 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s

  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=America/Sao_Paulo
      - BROWSER_TIMEOUT=120000
    ports:
      - 8191:8191
    restart: unless-stopped
    logging: *default-logging
    # --- CABRESTO DE RECURSOS (Impede de travar o PC) ---
    deploy:
      resources:
        limits:
          cpus: '1.0' 
          memory: 1G  
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8191 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s

  zurg:
    image: ghcr.io/debridmediamanager/zurg-testing:latest
    container_name: zurg
    restart: unless-stopped
    ports:
      - 9999:9999
    volumes:
      - ./app-data/zurg-rclone/zurg-config/config.yml:/app/config.yml
      - ./app-data/zurg-rclone/zurg-data:/app/data
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9999 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  rclone:
    image: rclone/rclone:latest
    container_name: rclone
    restart: unless-stopped
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - /mnt/realdebrid:/data:shared
      - ./app-data/zurg-rclone/rclone-config/rclone.conf:/config/rclone/rclone.conf
      # --- Cache transferido para a Memória RAM (/dev/shm) ---
      - /dev/shm/rclone_cache:/cache
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    devices:
      - /dev/fuse:/dev/fuse:rwm
    # --- Cache ajustado com segurança para 1G ---
    command: "mount zurg: /data --allow-other --allow-non-empty --dir-cache-time 10s --vfs-cache-mode writes --vfs-read-chunk-size 32M --vfs-read-chunk-size-limit 1G --buffer-size 64M --no-checksum --no-modtime --vfs-cache-max-age 1h --uid 1000 --gid 1000"
    depends_on:
      zurg:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "mountpoint -q /data || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  comet:
    image: ghcr.io/g0ldyy/comet:latest
    container_name: comet
    restart: unless-stopped
    ports:
      - 54321:8000
    volumes:
      - ./comet/data:/app/data
    environment:
      - TZ=America/Sao_Paulo
      - FASTAPI_HOST=0.0.0.0
      - FASTAPI_PORT=8000
      - FASTAPI_WORKERS=1
      - INDEXER_MANAGER_TYPE=prowlarr
      - INDEXER_MANAGER_URL=http://prowlarr:9696
      - INDEXER_MANAGER_API_KEY=806fba39ea704f458c3a2f75c064e0a5
      - INDEXER_MANAGER_TIMEOUT=20
      - ANIME_MAPPING_ENABLED=False
    logging: *default-logging
    depends_on:
      prowlarr:
        condition: service_healthy

  dfindexer:
    image: ghcr.io/dflexy/dfindexer:latest
    container_name: dfindexer
    ports:
      - 9697:7006
    environment:
      - REDIS_HOST=redis-dfindexer
      - REDIS_PORT=6379
      - FLARESOLVERR_ADDRESS=http://flaresolverr:8191
      - FLARESOLVERR_TIMEOUT=120
      - PORT=7006
      - LOG_LEVEL=1
      - LOG_FORMAT=console
      - TZ=America/Sao_Paulo
    depends_on:
      redis-dfindexer:
        condition: service_healthy
      flaresolverr:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  dfindexer-proxy:
    build: ./my-middlware-dfindexer-prowlarr
    container_name: dfindexer-proxy
    ports:
      - 7070:7070
    volumes:
      - ./app-data/dfindexer-proxy-data:/app/data
    environment:
      - DFINDEXER_URL=http://dfindexer:7006
      - TZ=America/Sao_Paulo
      - TMDB_API_KEY=e82f6fbe5160903a2ff16a0a9687ea9c
    depends_on:
      dfindexer:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7070/api?t=caps || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis-dfindexer:
    image: redis:7
    container_name: redis-dfindexer
    volumes:
      - ./app-data/redis-data:/data
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  betor-proxy:
    build: ./btor-sonarr-middleware
    container_name: betor-proxy
    ports:
      - 7008:7008
    volumes:
      - ./app-data/betor-proxy-data:/app/data
    environment:
      - TZ=America/Sao_Paulo
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7008/api?t=caps || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
