services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - DOTNET_SYSTEM_NET_HTTP_USESOCKETSHTTPHANDLER=0
    volumes:
      - ./prowlarr/config:/config
    ports:
      - 9696:9696
    restart: unless-stopped

  rdt-client:
    image: rogerfar/rdtclient:latest
    container_name: rdt-client
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ./rdtclient/data:/data
    ports:
      - 6500:6500
    restart: unless-stopped

  flaresolverr:
    # Em 2026, certifique-se de usar a v3 ou superior, 
    # pois as anteriores não lidam bem com o Cloudflare Turnstile atual.
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=America/Sao_Paulo
    ports:
      - 8191:8191
    restart: unless-stopped

  torrent-indexer:
    build: ./torrent-indexer
    container_name: torrent-indexer
    ports:
      - 7006:7006
    environment:
      - FLARESOLVERR_ADDRESS=http://flaresolverr:8191
      - FLARESOLVERR_POOL_SIZE=1
      - FLARESOLVERR_TIMEOUT_SECONDS=60
      - FALLBACK_TITLE_ENABLED=true
      - MAGNET_METADATA_API=https://magnet-metadata-api.darklyn.org
      - CACHE_EXPIRATION=24h
      # -> Adicione esta linha aqui:
      - REDIS_HOST=redis-indexer:6379
    depends_on:
      - flaresolverr
      - redis-indexer
    command: sh -c "sleep 15 && ./app"
    restart: always

  torznab-proxy:
    build: ./torznab-proxy
    container_name: torznab-proxy
    ports:
      - 7070:7070
    depends_on:
      - torrent-indexer
    restart: unless-stopped

  redis-indexer:
    image: redis:alpine
    container_name: redis-indexer
    restart: unless-stopped
    # Comando otimizado para salvar no disco a cada 60s e usar pouca RAM
    command: redis-server --save 60 1 --loglevel warning

  comet:
    image: ghcr.io/g0ldyy/comet:latest
    container_name: comet
    restart: unless-stopped
    ports:
      - 54321:8000
    volumes:
      - ./comet/data:/app/data
    environment:
      - TZ=America/Sao_Paulo
      # Configurações do servidor do Comet
      - FASTAPI_HOST=0.0.0.0
      - FASTAPI_PORT=8000
      - FASTAPI_WORKERS=1
      # Integração com o Prowlarr
      - INDEXER_MANAGER_TYPE=prowlarr
      - INDEXER_MANAGER_URL=http://prowlarr:9696
      - INDEXER_MANAGER_API_KEY=806fba39ea704f458c3a2f75c064e0a5
      - INDEXER_MANAGER_TIMEOUT=20
      # (Opcional) Se quiser usar todos os indexadores do Prowlarr, deixe a linha abaixo comentada.
      # Se quiser restringir para usar apenas o seu torrent-indexer, coloque o nome exato dele no Prowlarr:
      # - INDEXER_MANAGER_INDEXERS=["NomeDoSeuIndexerNoProwlarr"]
      # Adicione esta linha abaixo:
      - ANIME_MAPPING_ENABLED=False 
    depends_on:
      - prowlarr
