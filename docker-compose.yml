services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - DOTNET_SYSTEM_NET_HTTP_USESOCKETSHTTPHANDLER=0
    volumes:
      - ./prowlarr/config:/config
    ports:
      - 9696:9696
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9696/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ./radarr/data:/config
      # O diretório de downloads precisa existir mesmo que seja "fake"
      - ./data/downloads:/downloads 
    ports:
      - 7878:7878
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ./sonarr/data:/config
      - ./data/downloads:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped

  rdt-client:
    image: rogerfar/rdtclient:latest
    container_name: rdt-client
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
    volumes:
      - ./rdtclient/data:/data
    ports:
      - 6500:6500
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6500 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=info
      - TZ=America/Sao_Paulo
      - BROWSER_TIMEOUT=120000
    ports:
      - 8191:8191
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8191 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

